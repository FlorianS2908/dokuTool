<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1179" role="img" aria-labelledby="title desc">
  <title id="title">DokuTool</title>
  <desc id="desc">DokuTool Logo mit digitaler Kachelmarke und Toolnamen unter dem Logo</desc>
  <defs>
    <linearGradient id="tileTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28f2e2"/>
      <stop offset=".55" stop-color="#00abc7"/>
      <stop offset="1" stop-color="#4aa6f2"/>
    </linearGradient>
    <linearGradient id="tileSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00abc7"/>
      <stop offset="1" stop-color="#3475d8"/>
    </linearGradient>
    <linearGradient id="tileFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1cced9"/>
      <stop offset="1" stop-color="#5a7df0"/>
    </linearGradient>
    <linearGradient id="paper" x1="444" y1="222" x2="752" y2="548" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcf8fb"/>
    </linearGradient>
    <linearGradient id="check" x1="374" y1="546" x2="790" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00abc7"/>
      <stop offset=".52" stop-color="#28f2e2"/>
      <stop offset="1" stop-color="#bdf77a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#00223b" flood-opacity=".18"/>
    </filter>
  </defs>

